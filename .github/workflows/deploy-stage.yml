name: Deploy Stage

on:
  workflow_dispatch:

env:
  # REPOSITORY
  BRANCH: master
  REPOSITORY_URL: https://github.com/${{ github.repository }}.git

  # Server
  SSH_HOST: ${{ vars.SSH_HOST }}
  SSH_USER: ${{ vars.SSH_USER }}
  SSH_PORT: ${{ vars.SSH_PORT || 22 }}

  # PROJECT
  APP_ROOT: $HOME/app


jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ env.SSH_HOST }}
          username: ${{ env.SSH_USER}}
          port: ${{ env.SSH_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            set -e

            log () {
                echo "[$(date --rfc-3339=seconds)]: $1" >> deployment.logs
                echo $1
            }

            APP_ROOT="${{ env.APP_ROOT }}"
            BRANCH="${{ env.BRANCH }}"
            REPOSITORY_URL="${{ env.REPOSITORY_URL }}"

            log "App dir: ${APP_ROOT}"
            log "Branch: ${BRANCH}"
            log "Repository url: ${REPOSITORY_URL}"

            if [ ! -d $APP_ROOT ]; then
              log "Application root '${APP_ROOT}' is not found. Exiting..."
              exit 1;
            elif [ ! -d "${APP_ROOT}/.git" ]; then
              log "Application root exists but there is no '.git' dir there. Exiting ..."
              exit 1;
            fi

            log "Changing directory to ${APP_ROOT} so, logs will be there. See ya |>o<|"

            cd $APP_ROOT

            log "Reset changes and reset HEAD to origin latest version of branch '${BRANCH}'"

            git fetch "$REPOSITORY_URL" "$BRANCH"
            git reset --hard FETCH_HEAD

            log "Building started at $(date)" >> deployment.logs

            nohup bash -c "
               docker compose build &&
               docker compose down &&
               docker compose up -d
              " >> deployment.logs 2>&1 &
            
            echo "Deployment pipeline completed successfully

            exit 0;
